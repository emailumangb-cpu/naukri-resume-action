name: Update Naukri Profile

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Generate matrix output
        id: set-matrix
        run: |
          MATRIX_JSON=$(node script/parse-profiles.js)
          echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT

  update-profile:
    needs: setup
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.setup.outputs.matrix)}}
    steps:
      - uses: actions/checkout@v6

      - name: Update Naukri profile for ${{ matrix.name }}
        uses: Prateek-Wayne/naukri-resume-action@main
        with:
          username: ${{ matrix.username }}
          password: ${{ matrix.password }}
          profile_id: ${{ matrix.profile_id }}
          resume_path: ${{ matrix.resume_path }}
          profile_summary: ${{ matrix.profile_summary }}
          resume_headline: ${{ matrix.resume_headline }}
