name: Update Naukri Profile

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight UTC (approx. 5:30 AM IST)
  workflow_dispatch: # Allows manual trigger

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run sanity checks on profiles.csv
        id: sanity-check
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  PRE-VALIDATION: Checking profiles.csv"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          node script/sanity-check.js
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  setup:
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Generate matrix output from profiles.csv
        id: set-matrix
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  GENERATING BUILD MATRIX"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          MATRIX_JSON=$(node script/parse-profiles.js)
          echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT
          echo "Profiles loaded: $(echo $MATRIX_JSON | node -e "process.stdin.on('data',d=>{const m=JSON.parse(d);console.log(m.include.length+' profiles')})")"

  update-profile:
    needs: setup
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.setup.outputs.matrix)}}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: ▶️ Processing ${{ matrix.name }}
        id: profile-header
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  PROFILE: ${{ matrix.name }}"
          echo "  RESUME:  ${{ matrix.resume_path }}"
          echo "  HEADLINE_LEN: ${{ length(matrix.resume_headline) }} chars"
          echo "  SUMMARY_LEN:  ${{ length(matrix.profile_summary) }} chars"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Update Naukri profile for ${{ matrix.name }}
        id: update-profile
        continue-on-error: true
        uses: Prateek-Wayne/naukri-resume-action@main
        with:
          username: ${{ matrix.username }}
          password: ${{ matrix.password }}
          profile_id: ${{ matrix.profile_id }}
          resume_path: ${{ matrix.resume_path }}
          profile_summary: ${{ matrix.profile_summary }}
          resume_headline: ${{ matrix.resume_headline }}

      - name: ✅ ${{ matrix.name }} completed successfully
        if: steps.update-profile.outputs.upload_status == 'success ✅'
        run: echo "Upload status: ${{ steps.update-profile.outputs.upload_status }} | Time: ${{ steps.update-profile.outputs.upload_time }}"

      - name: ❌ ${{ matrix.name }} failed
        if: failure() || steps.update-profile.outcome == 'failure'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  FAILED: ${{ matrix.name }}"
          echo "  UPLOAD STATUS: ${{ steps.update-profile.outputs.upload_status }}"
          echo "  Check logs above for error details"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
